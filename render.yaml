services:
  - type: worker
    name: escrow-bot
    env: python
    rootDir: phase1_bot
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -u bot/main.py
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: escrow_phase1
      - key: ADMIN_USER_IDS
        sync: false
      - key: ESCROW_BTC_ADDRESS
        sync: false
      - key: ESCROW_USDT_ADDRESS
        sync: false
      - key: ESCROW_ETH_ADDRESS
        sync: false
      - key: ESCROW_LTC_ADDRESS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPPORTED_CURRENCIES
        value: '["BTC","USDT","ETH","LTC"]'
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: BLOCKCYPHER_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: HEARTBEAT_INTERVAL_SECONDS
        value: "300"
